    <div class="app-container">
        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-wrapper">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="expert-search" placeholder="Search for vets or specialists...">
            </div>
        </div>

        <!-- Categories -->
        <div class="categories-bar">
            <button class="category-chip active">All</button>
            <button class="category-chip">Vet Doctors</button>
            <button class="category-chip">Livestock</button>
            <button class="category-chip">Crop Experts</button>
            <button class="category-chip">Soil Science</button>
        </div>

        <!-- Consultants List -->
        <section class="professionals-section" id="experts">
            <div class="section-header">
                <h2 class="section-title">Top Consultants</h2>
                <div class="filter-btn">
                    <i class="ph ph-sliders"></i>
                </div>
            </div>

            <div class="grid" id="professionals-grid">
                <p class="loading-text">Loading professionals...</p>
            </div>
        </section>
    </div>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <button class="modal-close" id="close-modal"><i class="ph ph-x"></i></button>
            <h3 class="modal-title">Book Consultation with <br><span id="prof-name"
                    style="color: var(--primary-color);"></span></h3>

            <form id="booking-form">
                <div class="form-group">
                    <label class="form-label" for="user_name">Full Name</label>
                    <input type="text" id="user_name" name="user_name" class="form-control" required
                        placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label" for="user_email">Email Address</label>
                    <input type="email" id="user_email" name="user_email" class="form-control" required
                        placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="user_phone">Phone Number</label>
                    <input type="tel" id="user_phone" name="user_phone" class="form-control" required
                        placeholder="+1 234 567 8900">
                </div>
                <div class="form-group">
                    <label class="form-label" for="date">Preferred Date & Time</label>
                    <input type="datetime-local" id="date" name="date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="message">What do you want to discuss?</label>
                    <textarea id="message" name="message" class="form-control"
                        placeholder="Briefly describe your issue or what you need help with..."></textarea>
                </div>
                <button type="submit" class="btn-primary" id="submit-btn" style="width: 100%;">
                    <span class="btn-text">Confirm Booking</span>
                    <span class="loader"></span>
                </button>
            </form>
        </div>
    </div>



    <!-- Scripts -->
    <script src="assets/js/script.js"></script>
</body>
