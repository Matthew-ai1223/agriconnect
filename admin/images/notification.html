<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications</title>
  <link rel="stylesheet" href="notification.css">
</head>
<body>
  <header class="header">
    <h1>Notifications</h1>
  </header>

  <main class="container">
    <ul class="notifications">
      <li class="notification new">
        <p><strong>John Doe</strong> liked your post.</p>
        <span class="time">2m ago</span>
      </li>
      <li class="notification">
        <p><strong>Mary Jane</strong> commented: "Great work!"</p>
        <span class="time">1h ago</span>
      </li>
      <li class="notification new">
        <p><strong>Admin</strong> sent you an update.</p>
        <span class="time">Yesterday</span>
      </li>
      <li class="notification">
        <p><strong>System</strong> maintenance scheduled tomorrow.</p>
        <span class="time">2d ago</span>
      </li>
    </ul>
  </main>
</body>
</html>
